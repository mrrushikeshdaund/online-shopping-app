<mat-card style="height: 100vh; background-color: #f2f0ea">
  <h1
    style="
      text-align: center;
      display: flex;
      align-items: center;
      flex-direction: column;
    "
  >
    <mat-icon
      style="color: rgb(79, 74, 74); font-size: 50px; height: auto; width: auto"
      >shopping_bag</mat-icon
    >
    Online Shopping
  </h1>
  @if (isVisible) {
  <mat-card-content class="main-section">
    <mat-card style="width: 30%">
      <mat-card-content>
        <div class="main-section" style="gap: 1rem">
          <mat-form-field appearance="outline" style="width: 100%">
            <mat-label>Username</mat-label>
            <input
              [(ngModel)]="username"
              matInput
              placeholder="Enter Username"
            />
            <mat-icon matPrefix>person</mat-icon>
            <mat-hint>Enter a valid username</mat-hint>
          </mat-form-field>
          <mat-form-field appearance="outline" style="width: 100%">
            <mat-label>Password</mat-label>
            <input
              [(ngModel)]="password"
              [type]="hide() ? 'password' : 'text'"
              matInput
              placeholder="Enter Password"
            />
            <mat-icon matPrefix>lock</mat-icon>
            <mat-hint>Password must be at least 6 characters</mat-hint>
            <button
              mat-icon-button
              matSuffix
              (click)="clickEvent($event)"
              [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hide()"
            >
              <mat-icon>{{
                hide() ? "visibility_off" : "visibility"
              }}</mat-icon>
            </button>
          </mat-form-field>
        </div>
        <button mat-button (click)="handleVisiblity()">Register here</button>
      </mat-card-content>
      <mat-card-actions style="display: flex; flex-direction: row-reverse">
        <button mat-button (click)="handleLoginAction()">Login</button>
        <button mat-button (click)="handleClearAction()">Clear</button>
      </mat-card-actions>
    </mat-card>
  </mat-card-content>
  } @else {
  <mat-card-content class="main-section">
    <mat-card style="width: 30%">
      <mat-card-content>
        <div class="main-section" style="gap: 1rem">
          <mat-form-field appearance="outline" style="width: 100%">
            <mat-label>Username</mat-label>
            <input
              [(ngModel)]="username"
              matInput
              placeholder="Enter Username"
            />
            <mat-icon matPrefix>person</mat-icon>
            <mat-hint>Enter a valid username</mat-hint>
          </mat-form-field>
          <mat-form-field appearance="outline" style="width: 100%">
            <mat-label>Email</mat-label>
            <input
              [(ngModel)]="email"
              matInput
              placeholder="Enter Email"
              type="email"
            />
            <mat-icon matPrefix>email</mat-icon>
            <mat-hint>Enter a valid email</mat-hint>
          </mat-form-field>
          <mat-form-field appearance="outline" style="width: 100%">
            <mat-label>Password</mat-label>
            <input
              [(ngModel)]="password"
              [type]="hide() ? 'password' : 'text'"
              matInput
              placeholder="Enter Password"
            />
            <mat-icon matPrefix>lock</mat-icon>
            <mat-hint>Password must be at least 6 characters</mat-hint>
            <button
              mat-icon-button
              matSuffix
              (click)="clickEvent($event)"
              [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hide()"
            >
              <mat-icon>{{
                hide() ? "visibility_off" : "visibility"
              }}</mat-icon>
            </button>
          </mat-form-field>
        </div>
        <button mat-button (click)="handleVisiblity()">Login here</button>
      </mat-card-content>
      <mat-card-actions style="display: flex; flex-direction: row-reverse">
        <button mat-button (click)="handleRegisterAction()">Register</button>
        <button mat-button (click)="handleClearAction()">Clear</button>
      </mat-card-actions>
    </mat-card>
  </mat-card-content>
  }
</mat-card>
